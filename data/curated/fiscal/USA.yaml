  - https://www.boem.gov/newsroom/press-releases/boem-announces-region-wide-oil-and-gas-lease-sale-gulf-mexico
  - https://www.boem.gov/newsroom/press-releases/boem-proposes-oil-and-gas-lease-sale-gulf-america
  - https://www.irs.gov/publications/p542
retrieved_at: "2026-07-19"
caveats:
  - >-
    Royalty is vintage-dependent. Verified points: Sale 256 (2020) 12.5% <200 m
    / 18.75% >=200 m; Sale 262 proposal (Jun 2025) 16 2/3% all depths; OBBBA
    Sales BBG1/BBG2/BBG3 (Dec 2025-Aug 2026) 12.5% all depths. The claim that
    18.75% deepwater began with Sale 206 (2008) appeared only in search-result
    summaries, not an accessed primary document — treated as unverified.
  - >-
    GovInfo URLs are mirrors of the canonical Federal Register documents
    2026-13779 (Lease Sale BBG3), 2025-19828 (BBG1), 2026-02289 (BBG2);
    federalregister.gov HTML pages were bot-blocked, so the GovInfo full texts
    and the FR API metadata endpoint were accessed instead.
  - >-
    State taxes do not enter this row (federal OCS); no verification of
    state-level applicability was attempted. Other federal levies (e.g.
    inspection fees) not compiled.
