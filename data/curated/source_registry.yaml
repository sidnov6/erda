# ERDA source registry — written from LIVE VERIFY results, never from memory.
# Sweep: 2026-07-18, nine parallel agents, every URL below returned a real
# response that day (or the block is documented). SLAs follow spec §8 where
# named; others are cadence-derived. Drift notes are load-bearing: connectors
# implement against them.

sources:
  eia_v2:
    name: "EIA Open Data v2"
    access: rest_key
    base_url: "https://api.eia.gov/v2/"
    cadence: weekly
    sla_days: 8            # §8: WPSR ≤ 8 days
    requires_key: true
    key_env: EIA_API_KEY
    verified_at: "2026-07-18"
    notes: >-
      Keyless → 403 API_KEY_MISSING for every route (key check precedes route
      resolution). api_key as query param. Register: eia.gov/opendata/register.php.
      v1 series IDs translate via /v2/seriesid/{SERIES_ID} (e.g. PET.WCESTUS1.W
      for WPSR crude stocks). Exact WPSR child routes verifiable only with a key.

  fred:
    name: "FRED (St. Louis Fed)"
    access: rest_key
    base_url: "https://api.stlouisfed.org/fred/series/observations"
    cadence: daily
    sla_days: 5            # daily series + weekend/holiday slack
    requires_key: true
    key_env: FRED_API_KEY
    verified_at: "2026-07-18"
    notes: >-
      Official REST needs free key (400 with clean JSON error otherwise);
      fredgraph.csv is keyless but bot-protected at TLS-fingerprint level —
      not usable server-side. CSV header drifted to observation_date. DTWEXBGS
      confirmed as the broad-dollar series (NOT ICE DXY — label accordingly).

  yf_curve:
    name: "Yahoo Finance futures strip (yfinance)"
    access: lib
    base_url: "https://finance.yahoo.com"
    cadence: daily
    sla_days: 4
    verified_at: "2026-07-18"
    notes: >-
      yfinance 1.5.1, no key. Continuous: CL=F, BZ=F, RB=F, HO=F. Dated:
      ROOT+monthCode+YY+".NYM" (CLZ26.NYM verified; 4-digit year and bare forms
      404). Missing tickers raise KeyError from fast_info, not clean 404 —
      catch broadly. Unofficial source: label indicative (§4).

  jodi:
    name: "JODI Oil World Database"
    access: bulk_csv
    base_url: "https://www.jodidata.org/_resources/files/downloads/oil-data/world_Primary_CSV.zip"
    cadence: monthly
    sla_days: 45           # §8
    verified_at: "2026-07-18"
    notes: >-
      DRIFT: bulk lives on jodidata.org (jodidb.org is only the interactive UI).
      ~23 MB zip, one CSV: REF_AREA,TIME_PERIOD,ENERGY_PRODUCT,FLOW_BREAKDOWN,
      UNIT_MEASURE,OBS_VALUE,ASSESSMENT_CODE. OBS_VALUE sentinels '-' (n/a) and
      'x' (not applicable) — parser must handle. Anonymous GET.

  baker_hughes:
    name: "Baker Hughes rig counts"
    access: xlsx
    base_url: "https://rigcount.bakerhughes.com/"
    cadence: weekly
    sla_days: 9            # §8
    verified_at: "2026-07-18"
    notes: >-
      Akamai blocks non-browser TLS fingerprints (plain httpx/curl fail) — fetch
      with curl_cffi Chrome impersonation. NA weekly XLSX at
      /static-files/d28e146b-f462-4769-a061-6ba4eb24a490 (UUID stable so far,
      content replaced weekly; ~7 MB); worldwide monthly at
      /static-files/30c1d107-938c-4c66-bb40-206588f2f79e. Fallback: scrape
      /na-rig-count for the anchor. Report format changed Aug 2025; Saudi
      methodology changed Jan 2024 (site banner).

  opec:
    name: "OPEC MOMR + ASB"
    access: pdf
    base_url: "https://www.opec.org/assets/assetdb/"
    cadence: monthly
    sla_days: 35
    verified_at: "2026-07-18"
    notes: >-
      MOMR PDF pattern momr-{month}-{yyyy}.pdf (lowercase month), prior months
      only — current month gated behind momr.opec.org until next release; current
      appendix XLSX momr-appendix-{month}-{yyyy}.xlsx IS live. Filenames
      occasionally irregular (…-1.pdf, abbreviated months) — try candidates,
      never assume. Extraction via pdfplumber marked extraction=semi_automated
      (§4). asb.opec.org now redirects to publications.opec.org/asb; bulk ASB
      Excel is registration-gated; ungated: asb-{yyyy}.pdf. HTML pages are
      Cloudflare-blocked to curl; asset downloads work with a browser UA.

  wb_pinksheet:
    name: "World Bank Commodity Markets (Pink Sheet)"
    access: xlsx
    base_url: "https://www.worldbank.org/en/research/commodity-markets"
    cadence: monthly
    sla_days: 40
    verified_at: "2026-07-18"
    notes: >-
      CMO-Historical-Data-Monthly.xlsx served from thedocs.worldbank.org under a
      ROTATING hashed path — scrape the landing page for the current href every
      run, never hardcode. Monthly Prices sheet: names row 5, units row 6, data
      from row 7, dates "1960M01", missing values "…". Verified through 2026M06.

  comtrade:
    name: "UN Comtrade"
    access: rest
    base_url: "https://comtradeapi.un.org"
    cadence: monthly
    sla_days: 70
    requires_key: false
    key_env: COMTRADE_API_KEY
    verified_at: "2026-07-18"
    notes: >-
      Keyless /public/v1/preview works but hard-caps 500 records (crude-exports
      all-reporters query hits the cap — treat as truncated). Free key unlocks
      /data/v1/get (100k records, 500 calls/day, 1 req/s — throttle). Key via
      subscription-key param or Ocp-Apim-Subscription-Key header.

  gdelt:
    name: "GDELT DOC 2.0"
    access: rest
    base_url: "https://api.gdeltproject.org/api/v2/doc/doc"
    cadence: 15min
    sla_days: 2
    verified_at: "2026-07-18"
    notes: >-
      No key; IP-based limit (1 request / 5 s). BLOCKED from this egress IP at
      sweep time (persistent 429 with GDELT throttle body) — endpoint alive,
      per-article JSON fields NOT live-confirmed; parse defensively and treat
      that exact 429 as retryable. Space requests ≥ 5 s.

  # ————— Phase 2 label sources (§5) — sweep 2026-07-18 —————

  sodir:
    name: "Norwegian Offshore Directorate FactPages"
    access: bulk_csv
    base_url: "https://factpages.sodir.no/public"
    cadence: monthly
    sla_days: 90
    verified_at: "2026-07-18"
    notes: >-
      SSRS CSV export wellbore_exploration_all (literal-ampersand query string;
      legacy npdfactpages paths 404). 2,197 exploration wellbores, 85 cols.
      Purpose includes new WILDCAT-CCS/APPRAISAL-CCS variants; content codes far
      richer than the spec's four (OIL SHOWS, GAS/CONDENSATE, WATER, blanks…).
      Coords wlbNsDecDeg/wlbEwDecDeg 100% populated but datum column says ED50 —
      shift vs WGS84 ≈100–200 m, far below the 0.05° grid; documented, not
      transformed. Spud = wlbEntryDate (DD.MM.YYYY). PK wlbNpdidWellbore.

  nsta:
    name: "UK NSTA offshore wellbores (ArcGIS Hub)"
    access: rest
    base_url: "https://services-eu1.arcgis.com/OZMfUznmLTnWccBc/arcgis/rest/services"
    cadence: monthly
    sla_days: 90
    verified_at: "2026-07-18"
    notes: >-
      Top-holes WGS84 layer 0 (item b5752e9f…): 13,374 wellbores, 5,129 E&A via
      ORIGINTENT. Outcome = FLOWCLASS (Dry Hole / Oil Well / Gas Well / Gas and
      Condensate Well / Oil Show / Gas Show / Hydrocarbon Indications / Unknown /
      null). REST query paginates 2000/page; Hub download SAS links expire ~1 h.
      The "E&A wellbore results (ED50)" layer is a 110-well curated subset — NOT
      the full set.

  nlog:
    name: "Netherlands NLOG boreholes (TNO)"
    access: rest
    base_url: "https://www.gdngeoservices.nl/geoserver/nlog/ows"
    cadence: monthly
    sla_days: 120
    verified_at: "2026-07-18"
    notes: >-
      WFS moved 2025-12 to gdngeoservices.nl (old gdw.nlog.nl dead). GetFeature
      nlog:gdw_ng_wll_all_utm srsName=EPSG:4326 → 6,728 boreholes, GeoJSON
      ~10 MB, one GET: type codes (EXP-HC…), result codes (FLR…), ISO spud
      dates, geometry. REST endpoints are POST-only JSON (GET 404s).

  boem_bsee:
    name: "BOEM Gulf of Mexico boreholes + field reserves"
    access: bulk_csv
    base_url: "https://www.data.boem.gov"
    cadence: weekly
    sla_days: 60
    verified_at: "2026-07-18"
    notes: >-
      /Well/Files/BoreholeRawData.zip regenerated daily: 57,446 boreholes,
      26 cols, WELL_TYPE_CODE E/D, coords, spud M/D/YYYY; filter
      REGION_CODE='G'. No direct outcome field — discovery proxy derives from
      lease→field join via FieldReserves mastdatadelimit.zip (no header rows).
      Documented as proxy in the dataset card.

  nopims:
    name: "Australia NOPIMS (NOPTA NEATS OData)"
    access: rest
    base_url: "https://services.neats.nopta.gov.au/odata/v1/public/nopims"
    cadence: monthly
    sla_days: 120
    verified_at: "2026-07-18"
    notes: >-
      DRIFT: spec URL redirects to a GA info page; live system is the NOPTA
      NEATS portal with open OData v4 (well/PublicNopimsWells, 8,910 boreholes,
      3,866 offshore, no page cap). Kick_Off_Date = spud; Borehole_Reason =
      purpose. NO structured outcome and NO lat/lon in the wells entity —
      connector must join an auxiliary GA source for coordinates/outcomes or
      document exclusion honestly.

  gem_goget:
    name: "GEM Global Oil & Gas Extraction Tracker"
    access: rest
    base_url: "https://publicgemdata.nyc3.cdn.digitaloceanspaces.com/interim_maps/"
    cadence: quarterly
    sla_days: 200
    verified_at: "2026-07-18"
    notes: >-
      March 2026 release. Canonical XLSX (with reserves) is one-shot-form gated —
      a human submits name/email once per release; presigned URLs ephemeral.
      Open path: goget_map_2026-03.geojson (12.6 MB, CC BY): discovery-year,
      status (operating/in-development/discovered/…), coords — no reserves.
      Filename is release-versioned; poll bucket ?prefix=interim_maps/.

  # ————— Phase 2 raster sources (§6) — static products —————

  grav_sandwell:
    name: "Sandwell & Smith marine gravity v33.1"
    access: bulk_csv
    base_url: "https://topex.ucsd.edu/pub/global_grav_1min/grav_33.1.nc"
    cadence: static
    sla_days: 3650
    verified_at: "2026-07-18"
    notes: >-
      v33.1 (2026-01-02), 1-arcmin netCDF, 599 MB, lat ±80 only, mGal. Marine
      validity — land pixels carry filler values, masked in the stack. Newer
      experimental SWOT series exists (grav_SWOT_05); pinned to the stable line.

  emag2:
    name: "EMAG2 v3 magnetic anomaly (NCEI)"
    access: bulk_csv
    base_url: "https://www.ngdc.noaa.gov/geomag/data/EMAG2/EMAG2_V3_UpCont_DataTiff.tif"
    cadence: static
    sla_days: 3650
    verified_at: "2026-07-18"
    notes: >-
      No netCDF exists (spec drift): CSV-zip 1.09 GB or GeoTIFF. Pinned: UpCont
      4 km GeoTIFF (228 MB, full global coverage; SeaLevel variant has gaps).
      2-arcmin, nT, version 20170530 unchanged.

  globsed:
    name: "GlobSed v3 total sediment thickness (NCEI)"
    access: bulk_csv
    base_url: "https://www.ncei.noaa.gov/data/oceans/archive/arc0231/0305030/1.1/data/0-data/GlobSed/GlobSed_package3/GlobSed-v3.nc"
    cadence: static
    sla_days: 3650
    verified_at: "2026-07-18"
    notes: >-
      MOVED into NCEI accession 0305030 (legacy ngdc path 404). 5-arcmin netCDF,
      10.8 MB, variable name 'z', meters, land NaN. v3 updates limited regions;
      elsewhere inherits older compilations — uncertainty noted in card.

  crust1:
    name: "CRUST1.0 (Laske, UCSD)"
    access: bulk_csv
    base_url: "https://igppweb.ucsd.edu/~gabi/crust1/crust1.0.tar.gz"
    cadence: static
    sla_days: 3650
    verified_at: "2026-07-18"
    notes: >-
      1° fixed-width ASCII: crust1.bnds 9th boundary = Moho depth (km, negative
      down). Crustal TYPE lives in the separate addon tarball (CNtype1-1.txt +
      key) — both fetched. Lon inner loop from 89.5N/179.5W.

  etopo2022:
    name: "ETOPO 2022 60-arcsec bedrock (NCEI)"
    access: bulk_csv
    base_url: "https://www.ngdc.noaa.gov/thredds/fileServer/global/ETOPO2022/60s/60s_bed_elev_netcdf/ETOPO_2022_v1_60s_N90W180_bed.nc"
    cadence: static
    sla_days: 3650
    verified_at: "2026-07-18"
    notes: >-
      469 MB netCDF, exactly 3× the 0.05° target → 3×3 block-mean (defensible
      vs striding). Chosen over GEBCO_2026 (15-arcsec only, 4 GB, subset API
      async + area-capped). Meters positive-up, EGM2008.

  ihfc_heatflow:
    name: "IHFC Global Heat Flow Database R2024"
    access: bulk_csv
    base_url: "https://datapub.gfz.de/download/10.5880.FIDGEO.2024.014-VEueRf/GHFBD-R2024_v.2026-03.zip"
    cadence: static
    sla_days: 3650
    verified_at: "2026-07-18"
    notes: >-
      Canonical = GFZ DOI copy v.2026.03 (ihfc-iugg.org XLSX is older). ZIP →
      TAB-delimited txt, 12 preamble rows, 67 cols, 91,182 records; q in mW/m²,
      lat_NS/long_EW. CC BY 4.0. Kriged→IDW with uncertainty surface per §6.

  usgs_provinces:
    name: "USGS World Geologic Provinces (WPA 2000)"
    access: bulk_csv
    base_url: "https://www.sciencebase.gov/catalog/file/get/60ad2fd7d34e4043c850edb3"
    cadence: static
    sla_days: 3650
    verified_at: "2026-07-18"
    notes: >-
      ScienceBase item 60ad2fd7… (DOI 10.5066/P9RMSU2R): 13 MB shapefile zip,
      1,023 polygons, 939 unique CODEs; fields CODE/NAME/TYPE/REG. Old
      certmapper path is WAF-challenged — use ScienceBase only. Volume fields
      use −9999 sentinels.

  # ————— Phase 3 offshore-overlap source (§12.3) — sweep 2026-07-19 —————

  wdpa:
    name: "World Database on Protected Areas (WDPA)"
    access: bulk_gdb
    base_url: "https://d1gam3xoknrgr2.cloudfront.net/current/"
    cadence: monthly
    sla_days: 45
    requires_key: false
    license: "non_commercial_attribution"
    attribution: >-
      UNEP-WCMC and IUCN (2026), Protected Planet: The World Database on
      Protected Areas (WDPA), July 2026, Cambridge, UK: UNEP-WCMC and IUCN.
      www.protectedplanet.net — cite release month/year; non-commercial use only.
    verified_at: "2026-07-19"
    notes: >-
      Open CloudFront bulk, no key: WDPA_<Mon><YYYY>_Public.zip (GDB, 1.75 GB;
      live 2026-07-19 Jul2026 = 200, Jun2026 = 404 → only the current release is
      served, so the connector tries current month then previous). The CSV variant
      (…_csv.zip, 23.8 MB) has the attributes but NO geometry — unusable for
      offshore-block overlap, so the connector reads the GDB directly. SCHEMA
      DRIFT: no MARINE/WDPAID columns this release; sites key on SITE_ID/SITE_PID
      with a REALM column (Terrestrial 297,335 / Coastal 10,551 / Marine 6,856).
      Connector keeps REALM in {Marine,Coastal} polygons (17,027 parcels: 6,476
      marine + 10,551 coastal), simplifies geometry (shapely tol ~0.005° ≈ 500 m,
      documented) and writes TWO artefacts — data/parquet/wdpa_areas.parquet
      (GeoParquet: geometry + attrs) and data/parquet/wdpa_attributes.parquet
      (attribute-only via run_connector: provenance + ledger + freshness; its
      ledger row provenances the sibling GeoParquet, which carries the same
      provenance columns). Grain = one polygon parcel (SITE_PID unique; SITE_ID
      repeats across multi-parcel sites). STATUS_YR 0 = "year unknown" → NA, never
      a real year. Transboundary ISO3 is ';'-joined (e.g. MOZ;ZAF). Reads GDB via
      geopandas/pyogrio (/vsizip); layer WDPA_poly_<Mon><YYYY>.

  gem_infra:
    name: "GEM oil/gas pipelines + LNG terminals (GOIT + GGIT-LNG)"
    access: rest
    base_url: "https://publicgemdata.nyc3.cdn.digitaloceanspaces.com/interim_maps/"
    cadence: quarterly
    sla_days: 400
    verified_at: "2026-07-19"
    notes: >-
      Open bucket, CC BY. Filenames ROTATE by release and old releases linger
      (goit_map_2025-03 AND goit_map_2026-06 both live) — resolve the latest
      key per tracker from the S3-style listing (?prefix=interim_maps/) every
      run, never hardcode. Current: goit_map_2026-06.geojson (211,894,140 B,
      oil+NGL pipelines) + ggit-lng_map_2025-11.geojson (196,079,995 B, gas
      pipelines + LNG terminal Points with facility-type import/export; 4
      Points have blank facility-type — skipped with a pinned tolerance). NO
      refineries tracker exists in the bucket. Files are huge: stream to
      data/raw/ then one-shot json.load (~1-2 GB RSS, quarterly batch);
      pipelines decimated to every 50th vertex + terminus for distance
      queries. start-year quirks: 5 phased ranges ("2013-2017" → first year)
      and one "Before 2024" (→ missing). SLA 400 d: releases are per-tracker
      annual-ish (ggit-lng release already 8 months old at verification).

  ofac_eu:
    name: "OFAC SDN/Consolidated + EU FSF sanctions programs (jurisdiction-level)"
    access: bulk_csv
    base_url: "https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/"
    cadence: weekly
    sla_days: 30
    verified_at: "2026-07-19"
    notes: >-
      Jurisdiction-level screening signal ONLY (licence-security notes) — NOT
      entity-level compliance screening. OFAC: anonymous GET (HEAD unsupported,
      chunked responses, content-type unreliable) for SDN.CSV (19,168 entries
      2026-07-19) + CONS_PRIM.CSV (480; SSI/NS-CMIC/HKAA); headerless 12-col
      CSV, "-0-" null sentinel, "] ["-joined multi-program cells, lone 0x1A
      EOF line; ADD.CSV deliberately unused (address countries are not
      program signals). Country rows derive from explicit program-token dicts;
      unknown tokens raise. OFAC's comprehensive SYRIA program revoked
      mid-2025 — SYR now derives via PAARSSR-EO13894/HRIT-SY. EU FSF:
      xmlFullSanctionsList_1_1 needs static public token dG9rZW4tMjAxNw as
      token param (403 without; worked 2026-07-19); export is POINT-IN-TIME —
      generationDate was 2026-06-05 (~6 weeks stale) at pull, recorded per
      row as list_generated_at; EU freshness bounds on it, not retrieved_at.
      Floor check: CUB/IRN/PRK/SYR/RUS/BLR/VEN must always be present.

  # ————— Phase 5 Layer-3 committee sources (§10) — sweep 2026-07-18/19 —————

  wgi:
    name: "World Bank Worldwide Governance Indicators"
    access: rest
    base_url: "https://api.worldbank.org/v2/country/all/indicator"
    cadence: annual
    sla_days: 425          # annual ~Sep release + slack (release verified 2024-latest)
    verified_at: "2026-07-19"
    notes: >-
      Source-3 indicator ids carry a GOV_WGI_ prefix (GOV_WGI_CC.EST … VA.EST);
      queries MUST pass source=3 — multi-indicator queries without it return an
      HTTP-200 message body, never data. Latest year 2024; 216 economies × 5
      years = 1080 rows/indicator at per_page=2000. Some responses carry a
      UTF-8 BOM (decode utf-8-sig); intermittent timeouts and multi-minute 502
      bursts observed live — retry with backoff. PV.EST breaches the nominal
      ±2.5 scale (YEM 2024 = −2.7506). Nine territories (incl. Taiwan, China)
      return empty countryiso3code — dropped, documented in the connector.
