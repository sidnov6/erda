[project]
name = "erda-validation"
version = "0.1.0"
description = "Reconciliation checks, freshness SLAs, nightly report generator."
requires-python = ">=3.11,<3.12"
dependencies = [
    "erda-contracts",
    "pandas>=2.2",
    "pyarrow>=17",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["erda_validation"]

[tool.uv.sources]
erda-contracts = { workspace = true }
