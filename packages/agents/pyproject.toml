[project]
name = "erda-agents"
version = "0.1.0"
description = "LangGraph feasibility committee: graph, typed tools, prompts, memo schema."
requires-python = ">=3.11,<3.12"
dependencies = [
    "erda-engine",
    "erda-contracts",
    "pydantic>=2.7",
    "pandas>=2.2",
    "pyarrow>=17",
    "pyyaml>=6",
    "langgraph>=0.2",
    "anthropic>=0.40",
    "xarray>=2024.6",
    "zarr>=2.18",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["erda_agents"]

[tool.uv.sources]
erda-engine = { workspace = true }
erda-contracts = { workspace = true }
