[project]
name = "erda-contracts"
version = "0.1.0"
description = "Pandera data contracts and the provenance ledger."
requires-python = ">=3.11,<3.12"
dependencies = [
    "pandera>=0.20",
    "pydantic>=2.7",
    "pandas>=2.2",
    "pyarrow>=17",
    "pyyaml>=6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["erda_contracts"]
